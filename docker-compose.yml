name: talk-budget-stack

services:
  postgres-db:
    image: postgres:16-alpine
    container_name: talkbudget-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-talkbudget}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-talkbudget}
      POSTGRES_DB: ${POSTGRES_DB:-talkbudget}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      # Host 5433 -> container 5432 (avoids clashing with a host Postgres on 5432).
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-talkbudget}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis-cache:
    image: redis:7-alpine
    container_name: talkbudget-redis
    ports:
      # Host 6380 -> container 6379 (avoids clashing with a host Redis on 6379).
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  fastapi-backend:
    build: ./backend
    container_name: talkbudget-backend
    env_file:
      - path: .env
        required: false
    environment:
      POSTGRES_HOST: postgres-db
      POSTGRES_PORT: 5432
      REDIS_HOST: redis-cache
      REDIS_PORT: 6379
      # Non-secret AI gateway config pinned here (overrides .env) so it can't
      # drift out of sync with OpenCode's actual endpoint/model naming.
      OPENCODE_BASE_URL: https://opencode.ai/zen/go/v1
      AI_MODEL: deepseek-v4-flash
    depends_on:
      postgres-db:
        condition: service_healthy
      redis-cache:
        condition: service_healthy
    ports:
      - "8000:8000"

  nextjs-frontend:
    build: ./frontend
    container_name: talkbudget-frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
    depends_on:
      - fastapi-backend
    ports:
      - "3000:3000"

volumes:
  pgdata:
